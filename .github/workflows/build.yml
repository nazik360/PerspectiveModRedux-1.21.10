name: Build Perspective Mod Redux 1.21.10

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Скачать код
        uses: actions/checkout@v4

      - name: Установить Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Установить Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.8'

      - name: Собрать мод
        run: gradle build

      - name: Загрузить jar как артефакт
        uses: actions/upload-artifact@v4
        with:
          name: perspectivemodredux-1.21.10
          path: build/libs/*.jar

