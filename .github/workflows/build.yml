name: Build Perspective Mod Redux 1.21.10

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # кнопка ручного запуска на сайте

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Скачать код
        uses: actions/checkout@v4

      - name: Установить Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Дать права gradlew
        run: chmod +x ./gradlew

      - name: Собрать мод
        run: ./gradlew build

      - name: Загрузить jar как артефакт
        uses: actions/upload-artifact@v4
        with:
          name: perspectivemodredux-1.21.10
          path: build/libs/*[^-sources][^-dev].jar
